name: Daily Insights Summary

on:
  schedule:
    # Runs daily at 9:00 AM Central Time (2:00 PM UTC / 3:00 PM UTC depending on DST)
    # Using 14:00 UTC which is 9:00 AM CDT (summer) or 8:00 AM CST (winter)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  contents: read
  pull-requests: read
  issues: write
  repository-projects: read

jobs:
  send-insights-summary:
    runs-on: ubuntu-latest
    # Only run on microsoft/PAX release branch
    if: github.repository == 'microsoft/PAX' && (github.ref == 'refs/heads/release' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Generate repository insights with weekly tracking
        id: insights
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require('fs');
            
            // Get date info
            const today = new Date();
            const dayOfWeek = today.getDay(); // 0=Sunday, 1=Monday, ..., 5=Friday
            const isFriday = dayOfWeek === 5;
            
            // Calculate which day of the week (1-5 for Monday-Friday)
            const dayOfWeekNum = dayOfWeek === 0 ? 5 : (dayOfWeek === 6 ? 5 : dayOfWeek);
            
            // Calculate week start (Monday)
            const weekStart = new Date(today);
            const daysToMonday = (dayOfWeek === 0 ? 6 : dayOfWeek - 1);
            weekStart.setDate(today.getDate() - daysToMonday);
            
            // Calculate week end (Friday)
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 4);
            
            const dateRangeStr = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + '-' + weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            
            // Get last baseline issue
            let baseline = null;
            let baselineWeek = 0;
            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: owner,
                repo: repo,
                labels: 'download-baseline',
                state: 'closed',
                sort: 'created',
                direction: 'desc',
                per_page: 1
              });
              
              if (issues.length > 0) {
                const baselineIssue = issues[0];
                const match = baselineIssue.body.match(/Week (\d+)/);
                if (match) {
                  baselineWeek = parseInt(match[1]);
                }
                
                // Parse baseline data from issue body
                const downloadMatch = baselineIssue.body.match(/Total Downloads: (\d+)/);
                const viewsMatch = baselineIssue.body.match(/Total Views: (\d+)/);
                const uniqueViewsMatch = baselineIssue.body.match(/Unique Visitors: (\d+)/);
                const clonesMatch = baselineIssue.body.match(/Total Clones: (\d+)/);
                const uniqueClonesMatch = baselineIssue.body.match(/Unique Cloners: (\d+)/);
                
                baseline = {
                  downloads: downloadMatch ? parseInt(downloadMatch[1]) : 0,
                  views: viewsMatch ? parseInt(viewsMatch[1]) : 0,
                  uniqueViews: uniqueViewsMatch ? parseInt(uniqueViewsMatch[1]) : 0,
                  clones: clonesMatch ? parseInt(clonesMatch[1]) : 0,
                  uniqueClones: uniqueClonesMatch ? parseInt(uniqueClonesMatch[1]) : 0
                };
              }
            } catch (error) {
              console.log('Unable to fetch baseline:', error.message);
            }
            
            const currentWeek = baselineWeek + 1;
            
            // Get repository info
            const { data: repoInfo } = await github.rest.repos.get({
              owner: owner,
              repo: repo
            });
            
            // Get traffic views (last 14 days)
            let views = null;
            try {
              const { data: viewsData } = await github.rest.repos.getViews({
                owner: owner,
                repo: repo,
                per: 'day'
              });
              views = viewsData;
            } catch (error) {
              console.log('Unable to fetch views data:', error.message);
            }
            
            // Get traffic clones (last 14 days)
            let clones = null;
            try {
              const { data: clonesData } = await github.rest.repos.getClones({
                owner: owner,
                repo: repo,
                per: 'day'
              });
              clones = clonesData;
            } catch (error) {
              console.log('Unable to fetch clones data:', error.message);
            }
            
            // Get referrers (top 10 referring sites)
            let referrers = null;
            try {
              const { data: referrersData } = await github.rest.repos.getTopReferrers({
                owner: owner,
                repo: repo
              });
              referrers = referrersData;
            } catch (error) {
              console.log('Unable to fetch referrers data:', error.message);
            }
            
            // Get popular content (top 10 paths)
            let popularPaths = null;
            try {
              const { data: pathsData } = await github.rest.repos.getTopPaths({
                owner: owner,
                repo: repo
              });
              popularPaths = pathsData;
            } catch (error) {
              console.log('Unable to fetch popular paths data:', error.message);
            }
            
            // Get all releases for download tracking
            let allReleases = [];
            let allTimeDownloads = 0;
            let currentAssetDownloads = {}; // Track current per-asset downloads
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: owner,
                repo: repo,
                per_page: 100
              });
              allReleases = releases;
              
              // Calculate all-time downloads and collect per-asset counts
              allTimeDownloads = releases.reduce((total, release) => {
                release.assets.forEach(asset => {
                  const assetKey = `${release.tag_name}::${asset.name}`;
                  currentAssetDownloads[assetKey] = asset.download_count;
                });
                return total + release.assets.reduce((sum, asset) => sum + asset.download_count, 0);
              }, 0);
            } catch (error) {
              console.log('Unable to fetch all releases:', error.message);
            }
            
            // Calculate this week's activity (delta from baseline)
            const thisWeekDownloads = baseline ? allTimeDownloads - baseline.downloads : allTimeDownloads;
            const thisWeekViews = baseline && views ? views.count - baseline.views : (views ? views.count : 0);
            const thisWeekUniqueViews = baseline && views ? views.uniques - baseline.uniqueViews : (views ? views.uniques : 0);
            const thisWeekClones = baseline && clones ? clones.count - baseline.clones : (clones ? clones.count : 0);
            const thisWeekUniqueClones = baseline && clones ? clones.uniques - baseline.uniqueClones : (clones ? clones.uniques : 0);
            
            // Build summary
            let summary = `# Daily Repository Insights for microsoft/${repo}\n\n`;
            summary += `**Date:** ${today.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}\n`;
            summary += `**Period:** ${dateRangeStr} (Day ${dayOfWeekNum} of 5${isFriday ? ' - Week Complete' : ''})\n`;
            if (baseline) {
              summary += `**Week ${currentWeek}** | Previous baseline: Week ${baselineWeek}\n`;
            } else {
              summary += `**Week ${currentWeek}** | First tracking week (no baseline yet)\n`;
            }
            summary += `\n---\n\n`;
            
            // Repository Stats
            summary += `## 📊 Repository Overview\n\n`;
            summary += `- **Stars:** ${repoInfo.stargazers_count} ⭐\n`;
            summary += `- **Forks:** ${repoInfo.forks_count}\n`;
            summary += `- **Watchers:** ${repoInfo.subscribers_count}\n`;
            summary += `- **Open Issues:** ${repoInfo.open_issues_count}\n`;
            summary += `- **Size:** ${(repoInfo.size / 1024).toFixed(2)} MB\n\n`;
            
            // This Week's Activity Summary
            summary += `## 📈 This Week's Activity (${dateRangeStr})\n\n`;
            summary += `- **Page Views:** ${thisWeekViews} (${thisWeekUniqueViews} unique)\n`;
            summary += `- **Git Clones:** ${thisWeekClones} (${thisWeekUniqueClones} unique)\n`;
            summary += `- **Release Downloads:** ${thisWeekDownloads}\n`;
            if (baseline) {
              summary += `\n*Calculated from baseline set on previous Friday*\n`;
            } else {
              summary += `\n*No baseline yet - this is your first tracking week. Baseline will be created this Friday.*\n`;
            }
            summary += `\n`;
            
            // Traffic - Views
            if (views) {
              summary += `## 👀 Traffic - Page Views\n\n`;
              summary += `**All-Time Total:** ${views.count} views (${views.uniques} unique visitors)\n\n`;
              
              if (views.views && views.views.length > 0) {
                summary += `### Recent Daily Activity (Last 7 Days):\n\n`;
                // Show last 7 days
                const recentViews = views.views.slice(-7);
                for (const day of recentViews) {
                  const date = new Date(day.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                  summary += `- **${date}:** ${day.count} views (${day.uniques} unique)\n`;
                }
                summary += `\n`;
              }
            } else {
              summary += `## 👀 Traffic - Page Views\n\n`;
              summary += `*Traffic data not available (requires push access)*\n\n`;
            }
            
            // Traffic - Clones
            if (clones) {
              summary += `## 📥 Git Clones\n\n`;
              summary += `**All-Time Total:** ${clones.count} clones (${clones.uniques} unique cloners)\n\n`;
              
              if (clones.clones && clones.clones.length > 0) {
                summary += `### Recent Daily Activity (Last 7 Days):\n\n`;
                const recentClones = clones.clones.slice(-7);
                for (const day of recentClones) {
                  const date = new Date(day.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                  summary += `- **${date}:** ${day.count} clones (${day.uniques} unique)\n`;
                }
                summary += `\n`;
              }
            } else {
              summary += `## 📥 Git Clones\n\n`;
              summary += `*Clone data not available (requires push access)*\n\n`;
            }
            
            // Downloads - All Releases with Weekly Deltas
            if (allReleases.length > 0) {
              summary += `## 💾 Release Downloads\n\n`;
              summary += `**All-Time Total:** ${allTimeDownloads.toLocaleString()} downloads across ${allReleases.length} release(s)\n`;
              if (baseline) {
                summary += `**This Week (${dateRangeStr}):** ${thisWeekDownloads.toLocaleString()} downloads\n`;
              }
              summary += `\n`;
              
              // Group files by category for better organization
              const categorizeAsset = (name) => {
                if (name.match(/\.exe$|\.msi$/i)) return { category: 'Applications', order: 1, icon: '🖥️' };
                if (name.match(/\.zip$|\.dmg$/i) && name.includes('macOS')) return { category: 'Applications', order: 1, icon: '🍎' };
                if (name.match(/\.ps1$/i)) return { category: 'PowerShell Scripts', order: 2, icon: '📜' };
                if (name.match(/\.pdf$/i)) return { category: 'Documentation (PDF)', order: 3, icon: '📄' };
                if (name.match(/\.md$/i) && name.includes('Documentation')) return { category: 'Documentation (Markdown)', order: 4, icon: '📝' };
                if (name.match(/^v\d+\.\d+\.\d+\.md$/i)) return { category: 'Release Notes', order: 5, icon: '📋' };
                if (name.match(/^(README|LICENSE|SECURITY|CONTRIBUTORS|CODE_OF_CONDUCT)\.md$/i)) return { category: 'Project Files', order: 6, icon: '📑' };
                return { category: 'Other Files', order: 7, icon: '📦' };
              };
              
              summary += `### All Releases:\n\n`;
              for (const release of allReleases) {
                const releaseDownloads = release.assets.reduce((sum, asset) => sum + asset.download_count, 0);
                const releaseDate = new Date(release.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                
                // Calculate weekly downloads for this release
                let releaseWeeklyDownloads = 0;
                if (baseline) {
                  releaseWeeklyDownloads = release.assets.reduce((sum, asset) => {
                    const assetKey = `${release.tag_name}::${asset.name}`;
                    const baselineCount = baselineAssetDownloads[assetKey] || 0;
                    return sum + (asset.download_count - baselineCount);
                  }, 0);
                }
                
                summary += `#### ${release.name || release.tag_name} (${releaseDate})\n`;
                summary += `**All-Time Total:** ${releaseDownloads.toLocaleString()} downloads`;
                if (baseline && releaseWeeklyDownloads > 0) {
                  summary += ` | **This Week:** ${releaseWeeklyDownloads.toLocaleString()}`;
                }
                summary += `\n\n`;
                
                if (release.assets.length > 0) {
                  // Group assets by category
                  const categorizedAssets = release.assets.map(asset => ({
                    ...asset,
                    ...categorizeAsset(asset.name)
                  })).sort((a, b) => {
                    if (a.order !== b.order) return a.order - b.order;
                    return b.download_count - a.download_count; // Within category, sort by downloads desc
                  });
                  
                  let currentCategory = '';
                  for (const asset of categorizedAssets) {
                    // Print category header if changed
                    if (asset.category !== currentCategory) {
                      if (currentCategory !== '') summary += `\n`;
                      summary += `**${asset.icon} ${asset.category}:**\n`;
                      currentCategory = asset.category;
                    }
                    
                    // Calculate weekly delta for this asset
                    let weeklyDelta = '';
                    if (baseline) {
                      const assetKey = `${release.tag_name}::${asset.name}`;
                      const baselineCount = baselineAssetDownloads[assetKey] || 0;
                      const thisWeekCount = asset.download_count - baselineCount;
                      if (thisWeekCount > 0) {
                        weeklyDelta = ` | +${thisWeekCount} this week`;
                      }
                    }
                    
                    summary += `  - ${asset.name}: ${asset.download_count.toLocaleString()}${weeklyDelta}\n`;
                  }
                  summary += `\n`;
                }
              }
            } else {
              summary += `## 💾 Downloads\n\n`;
              summary += `*No releases found*\n\n`;
            }
            
            // Most Viewed Files
            if (popularPaths && popularPaths.length > 0) {
              summary += `## � Most Viewed Repository Files\n\n`;
              summary += `*These are the most viewed files/paths in the repository (last 14 days)*\n\n`;
              
              for (const path of popularPaths.slice(0, 10)) {
                // Highlight if it's the PowerShell script
                const isScript = path.path.includes('.ps1') || path.path.includes('script');
                const indicator = isScript ? ' 📜' : '';
                summary += `- **${path.path}**${indicator}: ${path.count} views (${path.uniques} unique)\n`;
              }
              summary += `\n`;
            }
            
            // Referrers
            if (referrers && referrers.length > 0) {
              summary += `## � Top Traffic Sources (Last 14 Days)\n\n`;
              for (const referrer of referrers.slice(0, 10)) {
                summary += `- **${referrer.referrer || 'Direct'}:** ${referrer.count} views (${referrer.uniques} unique)\n`;
              }
              summary += `\n`;
            }
            
            summary += `---\n\n`;
            summary += `*This is an automated daily insights summary. View the full [traffic analytics](https://github.com/${owner}/${repo}/graphs/traffic) on GitHub.*\n`;
            
            // If it's Friday, create a new baseline issue
            if (isFriday) {
              try {
                // Serialize per-asset downloads as JSON
                const assetDownloadsJson = JSON.stringify(currentAssetDownloads, null, 2);
                
                const baselineBody = '# Weekly Baseline - Week ' + currentWeek + '\\n\\n' +
                  '**Date:** ' + today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) + '\\n' +
                  '**Week Range:** ' + dateRangeStr + '\\n\\n' +
                  '## Baseline Metrics (for next week\\'s comparison):\\n\\n' +
                  '- **Total Downloads:** ' + allTimeDownloads + '\\n' +
                  '- **Total Views:** ' + (views ? views.count : 0) + '\\n' +
                  '- **Unique Visitors:** ' + (views ? views.uniques : 0) + '\\n' +
                  '- **Total Clones:** ' + (clones ? clones.count : 0) + '\\n' +
                  '- **Unique Cloners:** ' + (clones ? clones.uniques : 0) + '\\n\\n' +
                  '## Per-Asset Download Counts:\\n\\n' +
                  '```json\\n' + assetDownloadsJson + '\\n```\\n\\n' +
                  '*Asset downloads are tracked with format: "tag::filename"*\\n\\n' +
                  '*This baseline will be used to calculate next week\\'s activity (Week ' + (currentWeek + 1) + ').*';

                const { data: baselineIssue } = await github.rest.issues.create({
                  owner: owner,
                  repo: repo,
                  title: 'Weekly Baseline - Week ' + currentWeek + ' - ' + today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
                  body: baselineBody,
                  labels: ['download-baseline', 'automated']
                });
                
                // Immediately close it
                await github.rest.issues.update({
                  owner: owner,
                  repo: repo,
                  issue_number: baselineIssue.number,
                  state: 'closed'
                });
                
                console.log('Created and closed baseline issue #' + baselineIssue.number + ' for Week ' + currentWeek);
                
                summary += '\\n\\n---\\n\\n';
                summary += '✅ **Week ' + currentWeek + ' Complete!** Baseline saved for next week\\'s tracking (including ' + Object.keys(currentAssetDownloads).length + ' individual file download counts).\\n';
              } catch (error) {
                console.log('Unable to create baseline issue:', error.message);
              }
            }
            
            // Write summary to environment file for next step
            fs.appendFileSync(process.env.GITHUB_ENV, `SUMMARY<<EOF\n${summary}\nEOF\n`);
      
      - name: Create insights summary issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = process.env.SUMMARY;
            
            // Create an issue that will be assigned to repo maintainers
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GitHub Microsoft/PAX Daily Insights Summary - ${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`,
              body: summary,
              labels: ['daily-insights', 'automated'],
              assignees: ['Rance9', 'shailendrahegde']
            });
            
            console.log(`Created insights summary issue: ${issue.html_url}`);
            console.log(`Assigned to: Rance9, shailendrahegde`);
            
            // Immediately close the issue so it doesn't clutter open issues
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
            
            console.log(`Closed insights issue #${issue.number} - you'll receive notification but it won't stay in open issues`);
