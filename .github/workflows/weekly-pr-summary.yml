name: Weekly PR Summary

on:
  schedule:
    # Runs every Friday at 2:00 PM Central Time (7:00 PM UTC / 8:00 PM UTC depending on DST)
    # Using 19:00 UTC which is 2:00 PM CDT (summer) or 1:00 PM CST (winter)
    - cron: '0 19 * * 5'
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  pull-requests: read
  issues: read

jobs:
  send-pr-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Generate PR summary
        id: summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fs = require('fs');
            
            // Get PRs closed in the last 7 days
            const oneWeekAgo = new Date();
            oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
            
            // Get all closed PRs
            const { data: closedPRs } = await github.rest.pulls.list({
              owner: owner,
              repo: repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });
            
            // Filter PRs closed in the last week by automation
            const autoClosedPRs = closedPRs.filter(pr => {
              const closedAt = new Date(pr.closed_at);
              return closedAt >= oneWeekAgo && !pr.merged_at;  // Closed but not merged = auto-closed
            });
            
            if (autoClosedPRs.length === 0) {
              console.log('No PRs were auto-closed this week');
              core.setOutput('has_content', 'false');
              return;
            }
            
            // Categorize PRs
            const external = [];
            const internal = [];
            
            for (const pr of autoClosedPRs) {
              // Get labels
              const labels = pr.labels.map(l => l.name);
              
              if (labels.includes('External-Contribution')) {
                external.push(pr);
              } else if (labels.includes('Internal-Contribution')) {
                internal.push(pr);
              }
            }
            
            // Build summary
            let summary = `# Weekly PR Summary for PAX\n\n`;
            summary += `**Week ending:** ${new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}\n\n`;
            summary += `**Total auto-closed PRs:** ${autoClosedPRs.length}\n\n`;
            
            if (external.length > 0) {
              summary += `## External Contributions (${external.length})\n\n`;
              for (const pr of external) {
                summary += `- **#${pr.number}**: ${pr.title}\n`;
                summary += `  - Author: @${pr.user.login}\n`;
                summary += `  - Closed: ${new Date(pr.closed_at).toLocaleDateString()}\n`;
                summary += `  - [View PR](${pr.html_url})\n\n`;
              }
            }
            
            if (internal.length > 0) {
              summary += `## Internal Microsoft Contributions (${internal.length})\n\n`;
              for (const pr of internal) {
                summary += `- **#${pr.number}**: ${pr.title}\n`;
                summary += `  - Author: @${pr.user.login}\n`;
                summary += `  - Closed: ${new Date(pr.closed_at).toLocaleDateString()}\n`;
                summary += `  - [View PR](${pr.html_url})\n\n`;
              }
            }
            
            summary += `---\n\n`;
            summary += `*This is an automated weekly summary of PRs that were auto-closed by the PR management workflow.*\n`;
            summary += `*To review or adjust the automation, see \`.github/workflows/manage-prs.yml\`*\n`;
            
            // Write summary to environment file for next step
            fs.appendFileSync(process.env.GITHUB_ENV, `SUMMARY<<EOF\n${summary}\nEOF\n`);
            core.setOutput('has_content', 'true');
      
      - name: Create summary issue
        if: steps.summary.outputs.has_content == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const summary = process.env.SUMMARY;
            
            // Create an issue that will be assigned to repo owner
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Weekly PR Summary - ${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`,
              body: summary,
              labels: ['weekly-summary', 'automated'],
              assignees: ['bmiddendorf']  // Assign to Brian
            });
            
            console.log(`Created summary issue: ${issue.html_url}`);
            
            // Immediately close the issue so it doesn't clutter open issues
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed'
            });
            
            console.log(`Closed summary issue #${issue.number} - you'll receive notification but it won't stay in open issues`);
