name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri app for Windows
      run: npm run tauri build

    - name: Create Windows distribution
      shell: pwsh
      run: |
        mkdir windows-dist
        $exePath = Get-ChildItem "src-tauri/target/release" -Name "*.exe" | Where-Object { $_ -like "*Purview*" }
        if ($exePath) {
          Copy-Item "src-tauri/target/release/$exePath" "windows-dist/"
          Rename-Item "windows-dist/$exePath" "PAX-Windows-Portable.exe"
        }
        # Also include MSI installer if available
        $msiPath = Get-ChildItem "src-tauri/target/release/bundle/msi" -Name "*.msi" -ErrorAction SilentlyContinue
        if ($msiPath) {
          Copy-Item "src-tauri/target/release/bundle/msi/$msiPath" "windows-dist/PAX-Windows-Installer.msi"
        }

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-Windows
        path: windows-dist/*

  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
            name: AppleSilicon
          - target: x86_64-apple-darwin  
            arch: x86_64
            name: Intel
    
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Install Rust target and verify
      run: |
        rustup target add ${{ matrix.target }}
        rustup target list --installed

    - name: Build frontend first
      run: npm run build

    - name: Build Tauri app for ${{ matrix.target }}
      run: |
        echo "Building for target: ${{ matrix.target }}"
        npm run tauri build -- --target ${{ matrix.target }} --verbose

    - name: Debug build output
      run: |
        echo "=== Build completed, checking output ==="
        echo "Target directory structure:"
        find src-tauri/target/${{ matrix.target }} -type f -name "*.app" 2>/dev/null || echo "No .app bundles found"
        find src-tauri/target/${{ matrix.target }} -type d -name "*.app" 2>/dev/null || echo "No .app directories found"
        echo "Full release directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/" 2>/dev/null || echo "Release directory not found"
        echo "Bundle directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" 2>/dev/null || echo "Bundle directory not found"
        echo "macOS bundle directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/macos/" 2>/dev/null || echo "macOS bundle directory not found"
        echo "=== End debug output ==="

    - name: Create macOS distribution
      run: |
        mkdir -p macos-dist-${{ matrix.target }}
        
        # First try to find .app bundle in target-specific directory
        APP_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos/" -name "*.app" -type d 2>/dev/null | head -1)
        
        # If not found, try the default release directory (for native builds)
        if [ -z "$APP_PATH" ]; then
          echo "No app bundle found in target-specific directory, trying default release directory..."
          APP_PATH=$(find "src-tauri/target/release/bundle/macos/" -name "*.app" -type d 2>/dev/null | head -1)
        fi
        
        # If still not found, try universal directory
        if [ -z "$APP_PATH" ]; then
          echo "No app bundle found in default directory, trying universal directory..."
          APP_PATH=$(find "src-tauri/target/universal-apple-darwin/release/bundle/macos/" -name "*.app" -type d 2>/dev/null | head -1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app bundle found in any expected location!"
          echo "Available files in src-tauri/target/:"
          find src-tauri/target/ -name "*.app" -type d 2>/dev/null || echo "No .app bundles found anywhere"
          exit 1
        fi
        
        APP_NAME=$(basename "$APP_PATH")
        echo "Found app bundle: $APP_NAME at $APP_PATH"
        
        # Copy the app bundle
        cp -r "$APP_PATH" "macos-dist-${{ matrix.target }}/"
        cd "macos-dist-${{ matrix.target }}"
        
        # Create ZIP with appropriate name
        zip -r "PAX-macOS-${{ matrix.name }}.zip" "$APP_NAME"

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-${{ matrix.target }}
        path: |
          macos-dist-${{ matrix.target }}/*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release assets
      run: |
        mkdir release-assets
        # Copy Windows artifacts
        cp PAX-Windows/* release-assets/ 2>/dev/null || true
        # Copy macOS artifacts
        cp PAX-aarch64-apple-darwin/* release-assets/ 2>/dev/null || true
        cp PAX-x86_64-apple-darwin/* release-assets/ 2>/dev/null || true
        # List what we have
        ls -la release-assets/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## PAX (Purview Audit eXporter) Release
          
          ### Downloads
          
          **Windows Users:**
          - `PAX-Windows-Portable.exe` - Single executable, no installation required
          - `PAX-Windows-Installer.msi` - Traditional Windows installer (if available)
          
          **Mac Users:**
          - `PAX-macOS-AppleSilicon.zip` - For Apple Silicon Macs (M1/M2/M3)
          - `PAX-macOS-Intel.zip` - For Intel-based Macs
          
          ### Quick Start
          
          1. **Windows**: Download and run the .exe file
          2. **Mac**: Download the appropriate .zip, extract, right-click the app and choose "Open"
          
          ### Requirements
          
          - PowerShell (automatically detected)
          - Microsoft 365 account with audit log access
          - Internet connection for authentication
          
          No administrative privileges required on any platform!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}