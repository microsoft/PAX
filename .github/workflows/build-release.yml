name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli@1.6.0

    - name: Build Tauri app for Windows
      run: npm run tauri build

    - name: Create Windows distribution
      shell: pwsh
      run: |
        mkdir windows-dist
        $exePath = Get-ChildItem "src-tauri/target/release" -Name "*.exe" | Where-Object { $_ -like "*Purview*" }
        if ($exePath) {
          Copy-Item "src-tauri/target/release/$exePath" "windows-dist/"
          Rename-Item "windows-dist/$exePath" "PAX-Windows-Portable.exe"
        }
        # Also include MSI installer if available
        $msiPath = Get-ChildItem "src-tauri/target/release/bundle/msi" -Name "*.msi" -ErrorAction SilentlyContinue
        if ($msiPath) {
          Copy-Item "src-tauri/target/release/bundle/msi/$msiPath" "windows-dist/PAX-Windows-Installer.msi"
        }

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-Windows
        path: windows-dist/*

  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        # Install system dependencies that might be needed for Tauri on macOS
        echo "Installing system dependencies..."

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli@1.6.0

    - name: Verify Tauri CLI installation
      run: |
        npm list -g @tauri-apps/cli
        tauri --version
        echo "Validating Tauri configuration..."
        tauri info || echo "Tauri info failed, but continuing..."

    - name: Verify frontend build
      run: |
        echo "Ensuring frontend is built..."
        if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
          echo "Frontend not built, building now..."
          npm run build
        else
          echo "Frontend already built"
        fi
        echo "Frontend dist contents:"
        ls -la dist/

    - name: Build Tauri app for native macOS (no cross-compilation)
      run: |
        echo "=== Pre-build checks ==="
        echo "Current working directory: $(pwd)"
        echo "Node.js version: $(node --version)"
        echo "npm version: $(npm --version)"
        echo "Rust version: $(rustc --version)"
        echo "Cargo version: $(cargo --version)"
        echo "Tauri CLI version: $(tauri --version)"
        
        echo "=== File system checks ==="
        echo "Tauri config file exists: $(test -f src-tauri/tauri.conf.json && echo 'yes' || echo 'no')"
        echo "Cargo.toml exists: $(test -f src-tauri/Cargo.toml && echo 'yes' || echo 'no')"
        echo "Frontend dist exists: $(test -d dist && echo 'yes' || echo 'no')"
        echo "Frontend dist contents:"
        ls -la dist/ || echo "dist directory not found"
        
        echo "=== Starting Tauri build ==="
        echo "Running: tauri build --verbose"
        tauri build --verbose 2>&1 | tee tauri-build.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "Tauri build exit code: $BUILD_EXIT_CODE"
        
        echo "=== Post-build directory scan ==="
        echo "Entire src-tauri/target structure:"
        find src-tauri/target -type f -name "*.app" 2>/dev/null || echo "No .app files found"
        find src-tauri/target -type d -name "*.app" 2>/dev/null || echo "No .app directories found"
        
        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "=== Build failed with exit code $BUILD_EXIT_CODE ==="
          exit $BUILD_EXIT_CODE
        fi

    - name: Debug native build output
      run: |
        echo "=== Native build completed, checking output ==="
        echo "Release directory contents:"
        ls -la "src-tauri/target/release/" 2>/dev/null || echo "Release directory not found"
        echo "Bundle directory contents:"
        ls -la "src-tauri/target/release/bundle/" 2>/dev/null || echo "Bundle directory not found"
        echo "macOS bundle directory contents:"
        ls -la "src-tauri/target/release/bundle/macos/" 2>/dev/null || echo "macOS bundle directory not found"
        echo "Searching for any .app bundles:"
        find src-tauri/target/ -name "*.app" -type d 2>/dev/null || echo "No .app bundles found anywhere"
        echo "=== End debug output ==="

    - name: Create macOS distribution (native build)
      run: |
        # Look for app bundle in the native release directory
        APP_PATH=$(find "src-tauri/target/release/bundle/macos/" -name "*.app" -type d 2>/dev/null | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app bundle found in native build!"
          echo "This suggests a fundamental issue with the Tauri macOS configuration."
          exit 1
        fi
        
        APP_NAME=$(basename "$APP_PATH")
        echo "Found native app bundle: $APP_NAME at $APP_PATH"
        
        # Create distribution directories for both architectures
        mkdir -p macos-dist-native
        
        # Copy the app bundle
        cp -r "$APP_PATH" "macos-dist-native/"
        cd "macos-dist-native"
        
        # Create ZIP files for both architectures (universal binary approach)
        zip -r "PAX-macOS-AppleSilicon.zip" "$APP_NAME"
        zip -r "PAX-macOS-Intel.zip" "$APP_NAME"
        
        echo "Created universal macOS app bundles"

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-macOS-Universal
        path: |
          macos-dist-native/*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release assets
      run: |
        mkdir release-assets
        # Copy Windows artifacts
        cp PAX-Windows/* release-assets/ 2>/dev/null || true
        # Copy macOS artifacts (universal build)
        cp PAX-macOS-Universal/* release-assets/ 2>/dev/null || true
        # List what we have
        ls -la release-assets/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## PAX (Purview Audit eXporter) Release
          
          ### Downloads
          
          **Windows Users:**
          - `PAX-Windows-Portable.exe` - Single executable, no installation required
          - `PAX-Windows-Installer.msi` - Traditional Windows installer (if available)
          
          **Mac Users:**
          - `PAX-macOS-AppleSilicon.zip` - For Apple Silicon Macs (M1/M2/M3)
          - `PAX-macOS-Intel.zip` - For Intel-based Macs
          
          ### Quick Start
          
          1. **Windows**: Download and run the .exe file
          2. **Mac**: Download the appropriate .zip, extract, right-click the app and choose "Open"
          
          ### Requirements
          
          - PowerShell (automatically detected)
          - Microsoft 365 account with audit log access
          - Internet connection for authentication
          
          No administrative privileges required on any platform!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}