name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        default: 'manual-build'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri app for Windows
      run: npm run tauri build

    - name: Create Windows distribution
      shell: pwsh
      run: |
        mkdir windows-dist
        $exePath = Get-ChildItem "src-tauri/target/release" -Name "*.exe" | Where-Object { $_ -like "*Purview*" }
        if ($exePath) {
          Copy-Item "src-tauri/target/release/$exePath" "windows-dist/"
          Rename-Item "windows-dist/$exePath" "PAX-Windows-Portable.exe"
        }
        # Also include MSI installer if available
        $msiPath = Get-ChildItem "src-tauri/target/release/bundle/msi" -Name "*.msi" -ErrorAction SilentlyContinue
        if ($msiPath) {
          Copy-Item "src-tauri/target/release/bundle/msi/$msiPath" "windows-dist/PAX-Windows-Installer.msi"
        }

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-Windows
        path: windows-dist/*

  build-macos:
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin  # Apple Silicon (M1/M2/M3)
          - x86_64-apple-darwin   # Intel Macs
    
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install frontend dependencies
      run: npm ci

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Build Tauri app for ${{ matrix.target }}
      run: npm run tauri build -- --target ${{ matrix.target }}

    - name: List build output for debugging
      run: |
        echo "Listing target directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/" || true
        echo "Listing bundle directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/" || true
        echo "Listing macos bundle directory contents:"
        ls -la "src-tauri/target/${{ matrix.target }}/release/bundle/macos/" || true

    - name: Create macOS distribution
      run: |
        mkdir -p macos-dist-${{ matrix.target }}
        
        # Find the .app bundle (it might have a slightly different name)
        APP_PATH=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos/" -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "Error: No .app bundle found!"
          exit 1
        fi
        
        APP_NAME=$(basename "$APP_PATH")
        echo "Found app bundle: $APP_NAME"
        
        # Copy the app bundle
        cp -r "$APP_PATH" "macos-dist-${{ matrix.target }}/"
        cd "macos-dist-${{ matrix.target }}"
        
        # Create ZIP with appropriate name
        if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
          zip -r "PAX-macOS-AppleSilicon.zip" "$APP_NAME"
        else
          zip -r "PAX-macOS-Intel.zip" "$APP_NAME"
        fi

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PAX-${{ matrix.target }}
        path: |
          macos-dist-${{ matrix.target }}/*.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Prepare release assets
      run: |
        mkdir release-assets
        # Copy Windows artifacts
        cp PAX-Windows/* release-assets/ 2>/dev/null || true
        # Copy macOS artifacts
        cp PAX-aarch64-apple-darwin/* release-assets/ 2>/dev/null || true
        cp PAX-x86_64-apple-darwin/* release-assets/ 2>/dev/null || true
        # List what we have
        ls -la release-assets/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        body: |
          ## PAX (Purview Audit eXporter) Release
          
          ### Downloads
          
          **Windows Users:**
          - `PAX-Windows-Portable.exe` - Single executable, no installation required
          - `PAX-Windows-Installer.msi` - Traditional Windows installer (if available)
          
          **Mac Users:**
          - `PAX-macOS-AppleSilicon.zip` - For Apple Silicon Macs (M1/M2/M3)
          - `PAX-macOS-Intel.zip` - For Intel-based Macs
          
          ### Quick Start
          
          1. **Windows**: Download and run the .exe file
          2. **Mac**: Download the appropriate .zip, extract, right-click the app and choose "Open"
          
          ### Requirements
          
          - PowerShell (automatically detected)
          - Microsoft 365 account with audit log access
          - Internet connection for authentication
          
          No administrative privileges required on any platform!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}